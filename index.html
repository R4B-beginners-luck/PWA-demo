<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="theme-color" content="#faf5ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ふわっとToDo">
  <meta name="description" content="やさしいデザインのTodoリスト管理アプリ">
  <title>ふわっとToDo</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="./icons/icon-96.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #faf5ff;
      --bg2: #f3ecfd;
      --surface: #ffffff;
      --surface2: #fdf9ff;
      --border: #e8d8f8;
      --border2: #d9c4f4;

      --sky: #b8a4e8;
      --sky-light: #ede6fb;
      --sky-dark: #8b6dd4;
      --sky-text: #5c3faa;

      --mint: #a8d8b8;
      --mint-light: #dff2e8;
      --mint-dark: #5bab7e;
      --mint-text: #2e6e4e;

      --peach: #f4b8cc;
      --peach-light: #fce8f0;
      --peach-dark: #d4688c;
      --peach-text: #8c3a58;

      --lavender: #96d0f0;
      --lavender-light: #ddf1fc;
      --lavender-dark: #4aaad8;
      --lavender-text: #1e6a98;

      --yellow: #fce8b0;
      --yellow-light: #fff6dc;

      --text: #4a3a6a;
      --text-muted: #9880be;
      --text-light: #c4b0e0;

      --radius: 20px;
      --radius-sm: 12px;
      --radius-pill: 100px;
      --shadow-soft: 0 2px 16px rgba(160,120,220,0.10);
      --shadow-card: 0 4px 24px rgba(160,120,220,0.13);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Zen Maru Gothic','Noto Sans JP',sans-serif;
      font-size: 15px;
      line-height: 1.65;
    }

    body::before {
      content:''; position:fixed; top:-120px; right:-120px;
      width:380px; height:380px;
      background:radial-gradient(circle,#e8d8f8 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; bottom:-100px; left:-100px;
      width:300px; height:300px;
      background:radial-gradient(circle,#fce8f0 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }

    /* ── ナビゲーション ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      display: flex;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      color: var(--text-light);
      transition: color 0.2s;
    }

    .nav-btn.active { color: var(--sky-text); }
    .nav-btn svg { width:20px; height:20px; stroke:currentColor; stroke-width:1.8; fill:none; }

    /* ── ページ ── */
    .page { display: none; }
    .page.active { display: block; }

    #app {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px 100px;
    }

    /* ── ヘッダー ── */
    header {
      padding: 40px 4px 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .logo-area h1 {
      font-size: clamp(1.8rem,7vw,2.6rem);
      font-weight: 700;
      color: var(--sky-text);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .logo-area h1 .wave { display:inline-block; animation:wave 2s ease-in-out infinite; }
    .logo-area .subtitle { font-size:12px; color:var(--text-muted); margin-top:4px; font-weight:400; }

    .header-date-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .date-day { font-size:22px; font-weight:700; color:var(--sky-text); line-height:1; }
    .date-label { font-size:11px; color:var(--text-muted); margin-top:2px; }

    /* ── 進捗カード ── */
    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-card);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .progress-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .stats-row { display:flex; gap:14px; }
    .stat { display:flex; flex-direction:column; align-items:center; }
    .stat-num { font-size:22px; font-weight:700; line-height:1; }
    .stat-label { font-size:10px; color:var(--text-muted); margin-top:2px; }
    .stat-num.sky { color:var(--sky-dark); }
    .stat-num.mint { color:var(--mint-dark); }
    .stat-num.total { color:var(--text-muted); }
    .progress-pct { font-size:14px; font-weight:700; color:var(--sky-text); }
    .progress-track { height:8px; background:var(--bg2); border-radius:var(--radius-pill); overflow:hidden; }
    .progress-fill {
      height:100%;
      background:linear-gradient(90deg,#b8a4e8 0%,#f4b8cc 50%,#a8d8b8 100%);
      border-radius:var(--radius-pill);
      transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── 入力カード ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 14px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    .input-row { display:flex; gap:8px; margin-bottom:12px; }

    #todo-input {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #todo-input::placeholder { color:var(--text-light); }
    #todo-input:focus { border-color:var(--sky); box-shadow:0 0 0 3px rgba(184,164,232,0.2); }

    .add-btn {
      width:44px; height:44px;
      background:var(--sky); border:none;
      border-radius:var(--radius-sm);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background 0.15s,transform 0.1s; flex-shrink:0;
    }
    .add-btn:hover { background:var(--sky-dark); }
    .add-btn:active { transform:scale(0.92); }
    .add-btn svg { width:18px; height:18px; stroke:#fff; stroke-width:2.5; }

    .row-label { font-size:11px; color:var(--text-muted); margin-bottom:6px; font-weight:500; }

    .chip-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }

    .chip {
      padding:5px 12px; border-radius:var(--radius-pill);
      border:1.5px solid var(--border); background:var(--surface2);
      font-size:12px; color:var(--text-muted);
      cursor:pointer; transition:all 0.15s; font-family:inherit; font-weight:500;
    }
    .chip:hover { border-color:var(--sky); color:var(--sky-text); }
    .chip.sel-sky { background:var(--sky-light); border-color:var(--sky); color:var(--sky-text); }
    .chip.sel-mint { background:var(--mint-light); border-color:var(--mint); color:var(--mint-text); }
    .chip.sel-peach { background:var(--peach-light); border-color:var(--peach); color:var(--peach-text); }
    .chip.sel-lavender { background:var(--lavender-light); border-color:var(--lavender); color:var(--lavender-text); }

    .pri-row { display:flex; gap:6px; }
    .pri-chip {
      padding:5px 12px; border-radius:var(--radius-pill);
      border:1.5px solid var(--border); background:var(--surface2);
      font-size:12px; color:var(--text-muted);
      cursor:pointer; transition:all 0.15s; font-family:inherit; font-weight:500;
    }
    .pri-chip:hover { border-color:var(--sky); }
    .pri-chip[data-p="high"].sel { background:var(--peach-light); border-color:var(--peach); color:var(--peach-text); }
    .pri-chip[data-p="medium"].sel { background:var(--yellow-light); border-color:#e8d070; color:#8a6a10; }
    .pri-chip[data-p="low"].sel { background:var(--mint-light); border-color:var(--mint); color:var(--mint-text); }

    /* ── フィルタータブ ── */
    .filter-tabs {
      display:flex; gap:6px; margin-bottom:16px;
      opacity:0; animation:fadeUp 0.6s ease forwards 0.35s;
    }
    .tab-btn {
      flex:1; padding:9px 8px;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); font-family:inherit;
      font-size:12px; font-weight:500; color:var(--text-muted);
      cursor:pointer; transition:all 0.2s;
    }
    .tab-btn.active { background:var(--sky-light); border-color:var(--sky); color:var(--sky-text); }

    /* ── Todoリスト ── */
    #todo-list {
      display:flex; flex-direction:column; gap:10px;
      opacity:0; animation:fadeUp 0.6s ease forwards 0.4s;
    }

    .empty-state {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:48px 24px;
      text-align:center; box-shadow:var(--shadow-soft);
    }
    .empty-icon { font-size:40px; margin-bottom:12px; }
    .empty-text { font-size:13px; color:var(--text-muted); }

    /* ── Todoアイテム ── */
    .todo-item {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:14px 16px;
      display:flex; align-items:flex-start; gap:12px;
      box-shadow:var(--shadow-soft);
      transition:transform 0.2s,box-shadow 0.2s;
      animation:itemIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position:relative;
    }
    .todo-item:hover { transform:translateY(-2px); box-shadow:var(--shadow-card); }
    .todo-item::before {
      content:''; position:absolute; left:0; top:12px; bottom:12px;
      width:4px; border-radius:0 4px 4px 0; background:var(--sky);
    }
    .todo-item.cat-仕事::before { background:var(--sky); }
    .todo-item.cat-個人::before { background:var(--lavender); }
    .todo-item.cat-買い物::before { background:var(--mint); }
    .todo-item.cat-その他::before { background:var(--peach); }
    .todo-item.done { opacity:0.55; background:var(--surface2); }
    .todo-item.done:hover { transform:none; box-shadow:var(--shadow-soft); }
    .todo-item.removing { animation:itemOut 0.3s ease forwards; }

    .check-btn {
      width:24px; height:24px; border-radius:50%;
      border:2px solid var(--border2); background:var(--surface2);
      cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; margin-top:1px;
    }
    .check-btn:hover { border-color:var(--sky); background:var(--sky-light); }
    .todo-item.done .check-btn { background:var(--mint); border-color:var(--mint); }
    .check-btn svg { width:12px; height:12px; stroke:#fff; stroke-width:3; opacity:0; transition:opacity 0.15s; }
    .todo-item.done .check-btn svg { opacity:1; }

    .todo-content { flex:1; min-width:0; }
    .todo-text { font-size:14px; color:var(--text); line-height:1.5; word-break:break-word; }
    .todo-item.done .todo-text { text-decoration:line-through; color:var(--text-light); }

    .todo-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    .meta-tag { font-size:11px; padding:2px 8px; border-radius:var(--radius-pill); font-weight:500; }
    .meta-cat-仕事 { background:var(--sky-light); color:var(--sky-text); }
    .meta-cat-個人 { background:var(--lavender-light); color:var(--lavender-text); }
    .meta-cat-買い物 { background:var(--mint-light); color:var(--mint-text); }
    .meta-cat-その他 { background:var(--peach-light); color:var(--peach-text); }
    .meta-pri-high { background:var(--peach-light); color:var(--peach-text); }
    .meta-pri-medium { background:var(--yellow-light); color:#8a6a10; }
    .meta-pri-low { background:var(--mint-light); color:var(--mint-text); }
    .meta-date { font-size:11px; color:var(--text-light); }

    .todo-actions { flex-shrink:0; opacity:0; transition:opacity 0.2s; }
    .todo-item:hover .todo-actions { opacity:1; }
    @media(max-width:480px){ .todo-actions { opacity:1; } }

    .del-btn {
      width:30px; height:30px; border-radius:8px;
      border:1.5px solid var(--border); background:var(--surface2);
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
    }
    .del-btn:hover { background:var(--peach-light); border-color:var(--peach); }
    .del-btn svg { width:13px; height:13px; stroke:var(--text-light); stroke-width:2; transition:stroke 0.15s; }
    .del-btn:hover svg { stroke:var(--peach-text); }

    footer { padding:24px 4px 0; display:flex; justify-content:center; opacity:0; animation:fadeUp 0.6s ease forwards 0.5s; }
    .clear-btn {
      background:none; border:1.5px solid var(--border);
      border-radius:var(--radius-pill); padding:8px 20px;
      font-family:inherit; font-size:12px; color:var(--text-muted); cursor:pointer; transition:all 0.2s;
    }
    .clear-btn:hover { border-color:var(--peach); color:var(--peach-text); background:var(--peach-light); }

    /* ══════════════════════════════
       目標ページ
    ══════════════════════════════ */
    .page-header {
      padding: 40px 4px 20px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.1s;
    }
    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--sky-text);
    }
    .page-subtitle { font-size:12px; color:var(--text-muted); margin-top:4px; }

    /* ── 目標入力カード ── */
    .goal-input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.15s;
    }

    .goal-input-card textarea {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 70px;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    .goal-input-card textarea:focus { border-color:var(--sky); }
    .goal-input-card textarea::placeholder { color:var(--text-light); }

    .goal-meta-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .goal-meta-row select, .goal-meta-row input[type="date"] {
      flex: 1;
      min-width: 120px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }

    .goal-add-btn {
      width: 100%;
      padding: 11px;
      background: var(--sky);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }
    .goal-add-btn:hover { background:var(--sky-dark); }

    /* ── 目標ツリー ── */
    #goal-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.2s;
    }

    .goal-tree-item {
      position: relative;
    }

    /* 階層ごとのインデント */
    .goal-tree-item[data-level="3"] { margin-left: 0; }
    .goal-tree-item[data-level="2"] { margin-left: 20px; }
    .goal-tree-item[data-level="1"] { margin-left: 40px; }

    /* 縦の接続線 */
    .goal-tree-item[data-level="2"]::before,
    .goal-tree-item[data-level="1"]::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 0;
      bottom: 50%;
      width: 2px;
      background: var(--border2);
      border-radius: 1px;
    }
    .goal-tree-item[data-level="2"]::after,
    .goal-tree-item[data-level="1"]::after {
      content: '';
      position: absolute;
      left: -14px;
      top: 50%;
      width: 12px;
      height: 2px;
      background: var(--border2);
    }

    .goal-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-soft);
      animation: itemIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    /* 期間レベル別の左ボーダー */
    .goal-card.level-3::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--sky); border-radius:0; }
    .goal-card.level-2::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--peach); border-radius:0; }
    .goal-card.level-1::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--mint); border-radius:0; }

    .goal-card.completed { opacity:0.65; background:var(--surface2); }
    .goal-card.removing { animation: itemOut 0.3s ease forwards; }

    .goal-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      padding-left: 8px;
    }

    .goal-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
      flex: 1;
    }
    .goal-text.done-goal { text-decoration: line-through; color: var(--text-light); }

    .goal-actions { display:flex; gap:6px; flex-shrink:0; align-items:center; }

    /* 子追加ボタン */
    .goal-child-btn {
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-family: inherit;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .goal-child-btn:hover { border-color:var(--sky); color:var(--sky-text); background:var(--sky-light); }

    .goal-done-btn {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--mint);
      background: var(--mint-light);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      color: var(--mint-text);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .goal-done-btn:hover { background:var(--mint); color:#fff; }
    .goal-card.completed .goal-done-btn { background:var(--mint); color:#fff; }

    .goal-del-btn {
      width:24px; height:24px; border-radius:6px;
      border:1.5px solid var(--border); background:var(--surface2);
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
      flex-shrink: 0;
    }
    .goal-del-btn:hover { background:var(--peach-light); border-color:var(--peach); }
    .goal-del-btn svg { width:11px; height:11px; stroke:var(--text-light); stroke-width:2; }
    .goal-del-btn:hover svg { stroke:var(--peach-text); }

    .goal-progress-track {
      height: 5px;
      background: var(--bg2);
      border-radius: var(--radius-pill);
      overflow: hidden;
      margin: 6px 0 8px 8px;
    }
    .goal-progress-fill {
      height: 100%;
      border-radius: var(--radius-pill);
      transition: width 0.5s ease;
    }
    .level-3 .goal-progress-fill { background: linear-gradient(90deg, var(--sky) 0%, var(--lavender) 100%); }
    .level-2 .goal-progress-fill { background: linear-gradient(90deg, var(--peach) 0%, var(--yellow) 100%); }
    .level-1 .goal-progress-fill { background: linear-gradient(90deg, var(--mint) 0%, var(--sky) 100%); }

    .goal-meta-info {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding-left: 8px;
    }

    .goal-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      font-weight: 500;
    }
    .badge-level-3 { background:var(--sky-light); color:var(--sky-text); }
    .badge-level-2 { background:var(--peach-light); color:var(--peach-text); }
    .badge-level-1 { background:var(--mint-light); color:var(--mint-text); }
    .badge-cat { background:var(--lavender-light); color:var(--lavender-text); }
    .badge-due { background:var(--yellow-light); color:#7a5e10; }
    .badge-due.overdue { background:var(--peach-light); color:var(--peach-text); }
    .badge-done { background:var(--mint-light); color:var(--mint-text); }
    .badge-children { background:var(--bg2); color:var(--text-muted); }

    /* 子追加フォーム（インライン） */
    .child-form {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-top: 8px;
      display: none;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }
    .child-form.open { display: flex; }
    .child-form input {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .child-form input:focus { border-color: var(--sky); }
    .child-form input::placeholder { color: var(--text-light); }
    .child-form-row { display:flex; gap:8px; }
    .child-form-row select {
      flex:1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }
    .child-submit-btn {
      padding: 7px 14px;
      background: var(--sky);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }
    .child-cancel-btn {
      padding: 7px 10px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .goal-tasks-link {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ══════════════════════════════
       カレンダーページ
    ══════════════════════════════ */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.15s;
    }

    .cal-nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      transition: all 0.15s;
    }
    .cal-nav-btn:hover { background:var(--sky-light); border-color:var(--sky); }
    .cal-nav-btn svg { width:16px; height:16px; stroke:var(--sky-text); stroke-width:2; fill:none; }

    .cal-month-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--sky-text);
    }

    .cal-grid {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-card);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.2s;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      margin-bottom: 8px;
    }
    .cal-wd {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      padding: 4px 0;
    }
    .cal-wd:first-child { color: var(--peach-text); }
    .cal-wd:last-child { color: var(--lavender-text); }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 4px;
    }

    .cal-day {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .cal-day:hover { background: var(--sky-light); }
    .cal-day.empty { cursor: default; }
    .cal-day.empty:hover { background: none; }
    .cal-day.today {
      background: var(--sky-light);
      border: 2px solid var(--sky);
      color: var(--sky-text);
      font-weight: 700;
    }
    .cal-day.selected {
      background: var(--sky);
      color: #fff;
      font-weight: 700;
    }
    .cal-day.sunday { color: var(--peach-dark); }
    .cal-day.saturday { color: var(--lavender-dark); }
    .cal-day.has-done::after {
      content: '';
      position: absolute;
      bottom: 3px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--mint-dark);
    }
    .cal-day.has-todo::after {
      content: '';
      position: absolute;
      bottom: 3px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--sky-dark);
    }
    .cal-day.has-both::after {
      background: linear-gradient(90deg, var(--sky-dark) 50%, var(--mint-dark) 50%);
    }
    .cal-day.other-month { color: var(--text-light); }

    /* 日別詳細 */
    .day-detail {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow-soft);
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .day-detail-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--sky-text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .day-detail-title .summary-badges {
      display: flex;
      gap: 6px;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .detail-item:last-child { border-bottom: none; }

    .detail-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-done { background: var(--mint-dark); }
    .dot-active { background: var(--sky-dark); }

    .detail-text { flex:1; color:var(--text); }
    .detail-text.done-text { text-decoration:line-through; color:var(--text-light); }

    /* 月間サマリー */
    .month-summary {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.25s;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .summary-num { font-size:24px; font-weight:700; }
    .summary-num.purple { color:var(--sky-dark); }
    .summary-num.green { color:var(--mint-dark); }
    .summary-num.pink { color:var(--peach-dark); }
    .summary-label { font-size:11px; color:var(--text-muted); margin-top:2px; }

    /* ── オフライン / インストールバナー ── */
    #offline-banner {
      position:fixed; top:0; left:0; right:0; z-index:200;
      background:var(--peach-light); color:var(--peach-text);
      border-bottom:1px solid var(--peach);
      text-align:center; padding:9px 16px;
      font-size:12px; font-weight:500;
      transform:translateY(-100%); transition:transform 0.3s;
    }
    #offline-banner.show { transform:translateY(0); }

    #install-banner {
      position:fixed; bottom:80px; left:50%;
      transform:translateX(-50%) translateY(100px); opacity:0;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:14px 18px;
      display:flex; align-items:center; gap:12px;
      box-shadow:0 8px 32px rgba(160,120,220,0.2); z-index:100;
      transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1),opacity 0.45s;
      white-space:nowrap;
    }
    #install-banner.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .install-text { font-size:13px; color:var(--text-muted); }
    .install-btn {
      padding:7px 16px; background:var(--sky); border:none;
      border-radius:var(--radius-sm); font-family:inherit;
      font-size:12px; font-weight:700; color:#fff;
      cursor:pointer; transition:background 0.15s;
    }
    .install-btn:hover { background:var(--sky-dark); }
    .install-close { background:none; border:none; color:var(--text-light); cursor:pointer; font-size:16px; line-height:1; }

    /* ── アニメーション ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to { opacity:1; transform:translateY(0); }
    }
    @keyframes itemIn {
      from { opacity:0; transform:scale(0.96) translateY(6px); }
      to { opacity:1; transform:scale(1) translateY(0); }
    }
    @keyframes itemOut {
      to { opacity:0; transform:translateX(16px) scale(0.95); max-height:0; margin:0; padding:0; border:0; }
    }
    @keyframes wave {
      0%,100% { transform:rotate(0deg); }
      25% { transform:rotate(12deg); }
      75% { transform:rotate(-8deg); }
    }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>
<body>

<div id="offline-banner">📡 オフラインです — データはローカルに保存されています</div>

<div id="app">

  <!-- ══ Todo ページ ══ -->
  <div class="page active" id="page-todo">
    <header>
      <div class="header-inner">
        <div class="logo-area">
          <h1>ふわっと<span class="wave">☁</span>ToDo</h1>
          <div class="subtitle" id="header-date"></div>
        </div>
        <div class="header-date-badge">
          <div class="date-day" id="date-day">--</div>
          <div class="date-label" id="date-label">--</div>
        </div>
      </div>
    </header>

    <div class="progress-card">
      <div class="progress-top">
        <div class="stats-row">
          <div class="stat"><div class="stat-num sky" id="stat-active">0</div><div class="stat-label">残り</div></div>
          <div class="stat"><div class="stat-num mint" id="stat-done">0</div><div class="stat-label">完了</div></div>
          <div class="stat"><div class="stat-num total" id="stat-total">0</div><div class="stat-label">合計</div></div>
        </div>
        <div class="progress-pct" id="pct">0%</div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="input-card">
      <div class="input-row">
        <input type="text" id="todo-input" placeholder="やることを入力してね ✏️" maxlength="200" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="add-btn" id="add-btn" aria-label="追加">
          <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="row-label">カテゴリ</div>
      <div class="chip-row" id="cat-chips">
        <button class="chip sel-sky" data-cat="仕事">💼 仕事</button>
        <button class="chip" data-cat="個人">🌸 個人</button>
        <button class="chip" data-cat="買い物">🛍 買い物</button>
        <button class="chip" data-cat="その他">✨ その他</button>
      </div>
      <div class="row-label">優先度</div>
      <div class="pri-row" id="pri-chips">
        <button class="pri-chip" data-p="high">🔴 高め</button>
        <button class="pri-chip sel" data-p="medium">🟡 ふつう</button>
        <button class="pri-chip" data-p="low">🟢 低め</button>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="tab-btn active" data-f="all">📋 すべて</button>
      <button class="tab-btn" data-f="active">⏳ 未完了</button>
      <button class="tab-btn" data-f="done">✅ 完了</button>
    </div>

    <div id="todo-list"></div>

    <footer>
      <button class="clear-btn" id="clear-btn">完了済みをまとめて削除</button>
    </footer>
  </div>

  <!-- ══ 目標ページ ══ -->
  <div class="page" id="page-goal">
    <div class="page-header">
      <div class="page-title">🎯 目標設定</div>
      <div class="page-subtitle">大切な目標を記録して、達成を目指そう</div>
    </div>

    <div class="goal-input-card">
      <div class="row-label">目標のタイトル</div>
      <textarea id="goal-input" placeholder="例：半年で英語を話せるようになる、今月の読書を10冊…" maxlength="200"></textarea>
      <div class="goal-meta-row">
        <select id="goal-level">
          <option value="3">🗻 長期（3）</option>
          <option value="2">🏃 中期（2）</option>
          <option value="1">⚡ 短期（1）</option>
        </select>
        <select id="goal-cat">
          <option value="仕事">💼 仕事</option>
          <option value="健康">💪 健康</option>
          <option value="学習">📚 学習</option>
          <option value="趣味">🎨 趣味</option>
          <option value="その他">✨ その他</option>
        </select>
      </div>
      <div class="goal-meta-row">
        <input type="date" id="goal-due">
      </div>
      <button class="goal-add-btn" id="goal-add-btn">＋ 目標を追加する</button>
    </div>

    <div id="goal-list"></div>
  </div>

  <!-- ══ カレンダーページ ══ -->
  <div class="page" id="page-calendar">
    <div class="page-header">
      <div class="page-title">📅 振り返りカレンダー</div>
      <div class="page-subtitle">毎日の達成をカレンダーで確認しよう</div>
    </div>

    <div class="cal-header">
      <button class="cal-nav-btn" id="cal-prev">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" id="cal-next">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>

    <div class="month-summary">
      <div class="summary-card">
        <div class="summary-num purple" id="sum-total">0</div>
        <div class="summary-label">タスク合計</div>
      </div>
      <div class="summary-card">
        <div class="summary-num green" id="sum-done">0</div>
        <div class="summary-label">完了済み</div>
      </div>
      <div class="summary-card">
        <div class="summary-num pink" id="sum-rate">0%</div>
        <div class="summary-label">達成率</div>
      </div>
    </div>

    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-wd">日</div><div class="cal-wd">月</div><div class="cal-wd">火</div>
        <div class="cal-wd">水</div><div class="cal-wd">木</div><div class="cal-wd">金</div>
        <div class="cal-wd">土</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>

    <div id="day-detail-area"></div>
  </div>

</div>

<!-- ボトムナビ -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-page="todo">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    ToDo
  </button>
  <button class="nav-btn" data-page="goal">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    目標
  </button>
  <button class="nav-btn" data-page="calendar">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    カレンダー
  </button>
</nav>

<div id="install-banner">
  <span class="install-text">ホーム画面に追加する？</span>
  <button class="install-btn" id="install-btn">追加する</button>
  <button class="install-close" id="install-close">✕</button>
</div>

<script>
// ══════════════════════════════════════
// State
// ══════════════════════════════════════
let todos = JSON.parse(localStorage.getItem('fuwatto-todos') || '[]');
let goals = JSON.parse(localStorage.getItem('fuwatto-goals') || '[]');
let filter = 'all';
let selCat = '仕事';
let selPri = 'medium';
let deferredPrompt = null;
let calYear, calMonth, selectedDay = null;

const DAYS = ['日','月','火','水','木','金','土'];
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

// ── 日付表示 ──
const mm = String(now.getMonth()+1).padStart(2,'0');
const dd = String(now.getDate()).padStart(2,'0');
document.getElementById('header-date').textContent = `${now.getFullYear()}年${mm}月${dd}日 (${DAYS[now.getDay()]}曜日)`;
document.getElementById('date-day').textContent = dd;
document.getElementById('date-label').textContent = `${DAYS[now.getDay()]}曜日`;

// ── Save ──
function saveTodos() { localStorage.setItem('fuwatto-todos', JSON.stringify(todos)); }
function saveGoals() { localStorage.setItem('fuwatto-goals', JSON.stringify(goals)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function toDateStr(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ══════════════════════════════════════
// ページ切替
// ══════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    btn.classList.add('active');
    if (page === 'calendar') renderCalendar();
    if (page === 'goal') renderGoals();
  });
});

// ══════════════════════════════════════
// Todo
// ══════════════════════════════════════
function renderTodo() {
  const active = todos.filter(t => !t.done).length;
  const done   = todos.filter(t => t.done).length;
  const total  = todos.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-done').textContent   = done;
  document.getElementById('stat-total').textContent  = total;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  let list = todos;
  if (filter === 'active') list = todos.filter(t => !t.done);
  if (filter === 'done')   list = todos.filter(t => t.done);

  const el = document.getElementById('todo-list');
  if (list.length === 0) {
    const empty = { all:'タスクがないよ〜', active:'全部終わった！', done:'まだ完了なし' };
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">${filter==='active'?'🎊':filter==='done'?'📝':'🌸'}</div><div class="empty-text">${empty[filter]}</div></div>`;
    return;
  }
  el.innerHTML = list.map(t => `
    <div class="todo-item cat-${t.category} ${t.done?'done':''}" data-id="${t.id}">
      <button class="check-btn" onclick="toggleTodo('${t.id}')" aria-label="完了切替">
        <svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <div class="todo-content">
        <div class="todo-text">${esc(t.text)}</div>
        <div class="todo-meta">
          <span class="meta-tag meta-cat-${t.category}">${t.category}</span>
          <span class="meta-tag meta-pri-${t.priority}">${{high:'高め',medium:'ふつう',low:'低め'}[t.priority]}</span>
          <span class="meta-date">${fmtDate(t.createdAt)}</span>
        </div>
      </div>
      <div class="todo-actions">
        <button class="del-btn" onclick="delTodo('${t.id}')" aria-label="削除">
          <svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function addTodo() {
  const inp = document.getElementById('todo-input');
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  todos.unshift({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    text, done: false, priority: selPri, category: selCat, createdAt: Date.now()
  });
  saveTodos(); inp.value = '';
  if (filter === 'done') setFilter('all');
  else renderTodo();
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; t.doneAt = t.done ? Date.now() : null; saveTodos(); renderTodo(); }
}

function delTodo(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) {
    el.classList.add('removing');
    el.addEventListener('animationend', () => { todos = todos.filter(t => t.id !== id); saveTodos(); renderTodo(); });
  }
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  renderTodo();
}

const CAT_SEL_MAP = {'仕事':'sel-sky','個人':'sel-lavender','買い物':'sel-mint','その他':'sel-peach'};
document.getElementById('cat-chips').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]');
  if (!btn) return;
  document.querySelectorAll('[data-cat]').forEach(b => b.className = 'chip');
  btn.classList.add('chip', CAT_SEL_MAP[btn.dataset.cat]);
  selCat = btn.dataset.cat;
});

document.getElementById('pri-chips').addEventListener('click', e => {
  const btn = e.target.closest('[data-p]');
  if (!btn) return;
  document.querySelectorAll('[data-p]').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  selPri = btn.dataset.p;
});

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => setFilter(b.dataset.f)));
document.getElementById('add-btn').addEventListener('click', addTodo);
document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
document.getElementById('clear-btn').addEventListener('click', () => { todos = todos.filter(t => !t.done); saveTodos(); renderTodo(); });

// ══════════════════════════════════════
// 目標
// ══════════════════════════════════════
// ══════════════════════════════════════
// 目標ツリー
// ══════════════════════════════════════

const LEVEL_LABEL = { 3:'🗻 長期', 2:'🏃 中期', 1:'⚡ 短期' };

// 子孫のIDを全取得
function getDescendants(id) {
  const children = goals.filter(g => g.parentId === id);
  return children.flatMap(c => [c.id, ...getDescendants(c.id)]);
}

// 子の達成率（再帰）
function calcProgress(id) {
  const g = goals.find(g => g.id === id);
  if (!g) return 0;
  const children = goals.filter(c => c.parentId === id);
  if (children.length === 0) return g.done ? 100 : 0;
  const avg = children.reduce((s, c) => s + calcProgress(c.id), 0) / children.length;
  return Math.round(avg);
}

// 目標をツリー順（深さ優先）に並べる
function flattenTree(parentId = null, items = goals) {
  return items
    .filter(g => (g.parentId || null) === parentId)
    .sort((a, b) => b.level - a.level || a.createdAt - b.createdAt)
    .flatMap(g => [g, ...flattenTree(g.id, items)]);
}

function renderGoals() {
  const el = document.getElementById('goal-list');
  if (goals.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-text">目標を追加してみよう！</div></div>`;
    return;
  }

  const tree = flattenTree();
  const today = new Date().toISOString().split('T')[0];

  el.innerHTML = tree.map(g => {
    const pct = calcProgress(g.id);
    const isOverdue = g.due && g.due < today && !g.done;
    const children = goals.filter(c => c.parentId === g.id);
    const doneChildren = children.filter(c => c.done).length;
    // 子が追加できる最大レベル = g.level - 1
    const canAddChild = g.level > 1;

    return `
    <div class="goal-tree-item" data-level="${g.level}" data-gid="${g.id}">
      <div class="goal-card level-${g.level} ${g.done?'completed':''}">
        <div class="goal-card-top">
          <div class="goal-text ${g.done?'done-goal':''}">${esc(g.text)}</div>
          <div class="goal-actions">
            ${canAddChild ? `<button class="goal-child-btn" onclick="openChildForm('${g.id}')">＋ 子目標</button>` : ''}
            <button class="goal-done-btn" onclick="toggleGoal('${g.id}')">${g.done?'✅':'完了'}</button>
            <button class="goal-del-btn" onclick="delGoal('${g.id}')">
              <svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </div>
        <div class="goal-progress-track">
          <div class="goal-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="goal-meta-info">
          <span class="goal-badge badge-level-${g.level}">${LEVEL_LABEL[g.level]}</span>
          <span class="goal-badge badge-cat">${g.category}</span>
          ${g.due ? `<span class="goal-badge badge-due ${isOverdue?'overdue':''}">${isOverdue?'⚠️ 期限切れ':'📅 '+g.due}</span>` : ''}
          ${children.length > 0 ? `<span class="goal-badge badge-children">子 ${doneChildren}/${children.length}</span>` : ''}
          ${g.done ? `<span class="goal-badge badge-done">🎉 達成！</span>` : pct > 0 ? `<span class="goal-badge badge-children">${pct}%</span>` : ''}
        </div>
        <!-- 子追加フォーム（インライン） -->
        <div class="child-form" id="child-form-${g.id}">
          <input type="text" placeholder="子目標のタイトル" maxlength="200" id="child-input-${g.id}">
          <div class="child-form-row">
            <select id="child-level-${g.id}">
              ${Array.from({length: g.level - 1}, (_,i) => g.level - 1 - i).map(lv =>
                `<option value="${lv}">${LEVEL_LABEL[lv]}</option>`
              ).join('')}
            </select>
            <select id="child-cat-${g.id}">
              <option value="仕事">💼 仕事</option>
              <option value="健康">💪 健康</option>
              <option value="学習">📚 学習</option>
              <option value="趣味">🎨 趣味</option>
              <option value="その他">✨ その他</option>
            </select>
            <button class="child-submit-btn" onclick="addChildGoal('${g.id}')">追加</button>
            <button class="child-cancel-btn" onclick="closeChildForm('${g.id}')">×</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openChildForm(parentId) {
  // 他を閉じる
  document.querySelectorAll('.child-form.open').forEach(f => f.classList.remove('open'));
  const form = document.getElementById('child-form-' + parentId);
  if (form) {
    form.classList.add('open');
    form.querySelector('input').focus();
  }
}

function closeChildForm(parentId) {
  const form = document.getElementById('child-form-' + parentId);
  if (form) form.classList.remove('open');
}

function addGoal() {
  const inp = document.getElementById('goal-input');
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  const level = parseInt(document.getElementById('goal-level').value);
  const cat   = document.getElementById('goal-cat').value;
  const due   = document.getElementById('goal-due').value;
  goals.unshift({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    text, level, category: cat, due,
    parentId: null, done: false, createdAt: Date.now()
  });
  saveGoals(); inp.value = '';
  renderGoals();
}

function addChildGoal(parentId) {
  const parent = goals.find(g => g.id === parentId);
  if (!parent) return;
  const inp   = document.getElementById('child-input-' + parentId);
  const text  = inp.value.trim();
  if (!text) { inp.focus(); return; }
  const level = parseInt(document.getElementById('child-level-' + parentId).value);
  const cat   = document.getElementById('child-cat-' + parentId).value;
  // バリデーション: 子は親より小さいレベル
  if (level >= parent.level) {
    alert(`子目標のレベルは親（${LEVEL_LABEL[parent.level]}）より小さい必要があります`);
    return;
  }
  goals.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    text, level, category: cat, due: '',
    parentId, done: false, createdAt: Date.now()
  });
  saveGoals(); closeChildForm(parentId);
  renderGoals();
}

function toggleGoal(id) {
  const g = goals.find(g => g.id === id);
  if (!g) return;
  g.done = !g.done;
  // 親を達成にしたら子も全部達成
  if (g.done) {
    getDescendants(id).forEach(cid => {
      const c = goals.find(g => g.id === cid);
      if (c) c.done = true;
    });
  }
  saveGoals(); renderGoals();
}

function delGoal(id) {
  const descendantIds = getDescendants(id);
  const allIds = [id, ...descendantIds];
  const el = document.querySelector(`.goal-tree-item[data-gid="${id}"]`);
  if (el) {
    el.querySelector('.goal-card').classList.add('removing');
    el.querySelector('.goal-card').addEventListener('animationend', () => {
      goals = goals.filter(g => !allIds.includes(g.id));
      saveGoals(); renderGoals();
    });
  }
}

document.getElementById('goal-add-btn').addEventListener('click', addGoal);
document.getElementById('goal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addGoal(); }
});

// ══════════════════════════════════════
// カレンダー
// ══════════════════════════════════════
function renderCalendar() {
  const label = `${calYear}年${calMonth+1}月`;
  document.getElementById('cal-month-label').textContent = label;

  // 月間サマリー
  const monthTodos = todos.filter(t => {
    const d = new Date(t.createdAt);
    return d.getFullYear() === calYear && d.getMonth() === calMonth;
  });
  const monthDone = monthTodos.filter(t => t.done).length;
  const monthTotal = monthTodos.length;
  document.getElementById('sum-total').textContent = monthTotal;
  document.getElementById('sum-done').textContent = monthDone;
  document.getElementById('sum-rate').textContent = monthTotal === 0 ? '0%' : Math.round(monthDone/monthTotal*100) + '%';

  // 日ごとにタスクを集計
  const dayMap = {};
  todos.forEach(t => {
    const ds = toDateStr(t.createdAt);
    if (!dayMap[ds]) dayMap[ds] = {todos:[],dones:[]};
    if (t.done) dayMap[ds].dones.push(t);
    else dayMap[ds].todos.push(t);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = toDateStr(Date.now());

  let html = '';
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayOfWeek = (firstDay + d - 1) % 7;
    const isToday = ds === todayStr;
    const isSelected = selectedDay === ds;
    const hasDone = dayMap[ds]?.dones.length > 0;
    const hasTodo = dayMap[ds]?.todos.length > 0;
    const dotClass = hasDone && hasTodo ? 'has-both' : hasDone ? 'has-done' : hasTodo ? 'has-todo' : '';
    const wdClass = dayOfWeek === 0 ? 'sunday' : dayOfWeek === 6 ? 'saturday' : '';
    const selClass = isSelected ? 'selected' : isToday ? 'today' : '';

    html += `<div class="cal-day ${wdClass} ${selClass} ${dotClass}" data-ds="${ds}" onclick="selectDay('${ds}')">${d}</div>`;
  }

  document.getElementById('cal-days').innerHTML = html;

  if (selectedDay) renderDayDetail(selectedDay, dayMap);
  else document.getElementById('day-detail-area').innerHTML = '';
}

function selectDay(ds) {
  selectedDay = selectedDay === ds ? null : ds;
  renderCalendar();
}

function renderDayDetail(ds, dayMap) {
  const data = dayMap?.[ds];
  const area = document.getElementById('day-detail-area');
  if (!data || (data.todos.length === 0 && data.dones.length === 0)) {
    const d = new Date(ds);
    area.innerHTML = `<div class="day-detail"><div class="day-detail-title">${d.getMonth()+1}月${d.getDate()}日</div><div class="empty-text" style="color:var(--text-light);font-size:13px;">この日のタスクはありません</div></div>`;
    return;
  }
  const d = new Date(ds);
  const allItems = [...data.dones, ...data.todos];
  const doneCount = data.dones.length;
  const totalCount = allItems.length;

  area.innerHTML = `
    <div class="day-detail">
      <div class="day-detail-title">
        ${d.getMonth()+1}月${d.getDate()}日
        <div class="summary-badges">
          <span class="goal-badge badge-done" style="font-size:11px;">✅ ${doneCount}件完了</span>
          ${data.todos.length>0?`<span class="goal-badge badge-span" style="font-size:11px;">⏳ ${data.todos.length}件残り</span>`:''}
        </div>
      </div>
      ${allItems.map(t => `
        <div class="detail-item">
          <div class="detail-dot ${t.done?'dot-done':'dot-active'}"></div>
          <div class="detail-text ${t.done?'done-text':''}">${esc(t.text)}</div>
          <span class="meta-tag meta-cat-${t.category}" style="font-size:10px;">${t.category}</span>
        </div>`).join('')}
    </div>`;
}

document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
  selectedDay = null; renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
  selectedDay = null; renderCalendar();
});

  e.preventDefault(); deferredPrompt = e;

});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./serviceworker.js')
    .then(r => console.log('[SW] OK:', r.scope))

}

renderTodo();
</script>
